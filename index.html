<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Pet Spa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .register-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #5f6368; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; height: 80px; }
        
        /* Medidor de Fuerza de Contraseña */
        .strength-mester { height: 6px; background-color: #e8eaed; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0; transition: width 0.3s, background-color 0.3s; }
        .strength-text { font-size: 12px; margin-top: 5px; color: #70757a; }

        .btn-submit { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        .btn-submit:hover { background-color: #1557b0; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .footer-links { text-align: center; margin-top: 20px; font-size: 14px; }
        .footer-links a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Crea tu cuenta</h2>
        <form action="registro_accion.php" method="POST" id="registroForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="usuario@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres">
                <div class="strength-meter"><div id="strength-bar" class="strength-bar"></div></div>
                <p id="strength-text" class="strength-text">Usa mayúsculas, números y símbolos.</p>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit" disabled>Crear mi cuenta</button>
        </form>

    <div class="footer-links">
        ¿Ya tienes cuenta? <a href="portal_clientes.php">Inicia sesión</a>
    </div>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');
    const submitBtn = document.getElementById('btn-submit');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let strength = 0;

        // Criterios de evaluación
        if (val.length >= 8) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;

        // Actualización visual del medidor
        const colors = ['#e8eaed', '#ea4335', '#fbbc04', '#34a853', '#188038'];
        const widths = ['0%', '25%', '50%', '75%', '100%'];
        const labels = [
            'Muy débil', 
            'Débil - agrega mayúsculas o números', 
            'Media - agrega símbolos', 
            'Fuerte', 
            'Muy fuerte (Passphrase recomendada)'
        ];

        strengthBar.style.width = widths[strength];
        strengthBar.style.background = colors[strength];
        strengthText.innerText = labels[strength];

        // Habilitar botón solo si cumple con requisitos mínimos (Fuerte o Muy fuerte)
        submitBtn.disabled = strength < 3;
    });
</script>

</body>
</html>
